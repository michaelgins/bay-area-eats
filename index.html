<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bay Area Eats — Candyland Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fredoka+One&family=Bubblegum+Sans&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Bubblegum Sans', cursive;
      background-color: #FFF0F5;
      background-image:
        radial-gradient(circle at 15% 15%, #FFD1DC 0%, transparent 35%),
        radial-gradient(circle at 85% 10%, #B5EAD7 0%, transparent 35%),
        radial-gradient(circle at 50% 45%, #FFDAC1 0%, transparent 40%),
        radial-gradient(circle at 10% 75%, #C7CEEA 0%, transparent 35%),
        radial-gradient(circle at 90% 80%, #FFB7D5 0%, transparent 35%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      padding: 44px 20px 28px;
    }
    .header h1 {
      font-family: 'Luckiest Guy', cursive;
      font-size: clamp(2.8rem, 9vw, 5.5rem);
      letter-spacing: 4px;
      line-height: 1;
      color: #FF4081;
      text-shadow:
        4px 4px 0 #FF80AB,
        -2px -2px 0 #AD1457,
        7px 7px 0 rgba(0,0,0,0.12);
      margin-bottom: 10px;
    }
    .header .subtitle {
      font-family: 'Fredoka One', cursive;
      font-size: 1.25rem;
      color: #7B1FA2;
      margin-bottom: 18px;
    }
    .source-links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .source-link {
      font-family: 'Fredoka One', cursive;
      font-size: 0.95rem;
      padding: 7px 20px;
      border-radius: 50px;
      text-decoration: none;
      border: 3px solid rgba(0,0,0,0.12);
      box-shadow: 0 3px 0 rgba(0,0,0,0.12);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .source-link:hover { transform: translateY(-2px); box-shadow: 0 5px 0 rgba(0,0,0,0.12); }
    .source-link:active { transform: translateY(1px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }
    .source-link.eater { background: #FF5252; color: #fff; }
    .source-link.infatuation { background: #FFD740; color: #333; }

    /* ── BOARD ── */
    .board {
      max-width: 960px;
      margin: 0 auto;
      padding: 10px 20px 20px;
    }

    /* ── START / FINISH ── */
    .badge {
      text-align: center;
      margin: 16px 0;
    }
    .badge span {
      font-family: 'Luckiest Guy', cursive;
      font-size: 1.6rem;
      letter-spacing: 4px;
      display: inline-block;
      padding: 10px 32px;
      border-radius: 50px;
      border: 4px solid rgba(0,0,0,0.15);
      box-shadow: 0 5px 0 rgba(0,0,0,0.15);
    }
    .badge.start span { background: #4CAF50; color: #fff; }
    .badge.finish span {
      background: linear-gradient(135deg, #FF6B9D 0%, #FFD93D 35%, #6BCB77 65%, #4D96FF 100%);
      color: #fff;
    }

    /* ── PATH LAYOUT ── */
    .path { display: flex; flex-direction: column; }

    .row {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: stretch;
    }
    .row.reverse { flex-direction: row-reverse; }

    /* turn connector */
    .connector {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 48px;
    }
    .connector.turn-right { justify-content: flex-end; }
    .connector.turn-left  { justify-content: flex-start; }
    .connector-inner {
      width: 64px;
      height: 44px;
      border: 6px dashed;
      border-radius: 0 0 32px 32px;
      border-top: none;
    }
    .connector.turn-right .connector-inner {
      border-color: var(--c);
      border-right-color: var(--c);
      border-radius: 0 0 32px 0;
    }
    .connector.turn-left .connector-inner {
      border-color: var(--c);
      border-left-color: var(--c);
      border-radius: 0 0 0 32px;
    }

    /* ── STOP CARD ── */
    .stop {
      flex: 1;
      min-width: 180px;
      max-width: 290px;
      border-radius: 22px;
      border: 4px solid rgba(0,0,0,0.14);
      box-shadow: 0 6px 0 rgba(0,0,0,0.14);
      padding: 16px 14px 14px;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }
    .stop::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(255,255,255,0.35) 0%, transparent 60%);
      pointer-events: none;
      border-radius: 18px;
    }
    .stop:hover { transform: translateY(-5px); box-shadow: 0 11px 0 rgba(0,0,0,0.14); }
    .stop:active { transform: translateY(1px); box-shadow: 0 2px 0 rgba(0,0,0,0.14); }

    .stop-num {
      font-family: 'Luckiest Guy', cursive;
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: rgba(0,0,0,0.3);
      margin-bottom: 5px;
    }
    .stop a {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .stop-emoji { font-size: 2rem; line-height: 1; }
    .stop-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: rgba(0,0,0,0.72);
      line-height: 1.2;
    }
    .stop-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .stop-tag {
      font-size: 0.68rem;
      font-weight: bold;
      letter-spacing: 0.3px;
      background: rgba(255,255,255,0.5);
      color: rgba(0,0,0,0.55);
      padding: 2px 8px;
      border-radius: 10px;
    }
    .stop-hood {
      font-size: 0.72rem;
      color: rgba(0,0,0,0.45);
    }
    .stop-cta {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.72rem;
      font-weight: bold;
      background: rgba(255,255,255,0.5);
      color: rgba(0,0,0,0.55);
      padding: 3px 10px;
      border-radius: 10px;
      letter-spacing: 0.3px;
    }

    /* ── FLOATING DECOR ── */
    .decor {
      position: fixed;
      font-size: 2rem;
      pointer-events: none;
      user-select: none;
      opacity: 0.55;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(-5deg); }
      50%       { transform: translateY(-12px) rotate(5deg); }
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 28px 20px 36px;
      font-size: 0.8rem;
      color: rgba(0,0,0,0.38);
    }
    footer a { color: inherit; }

    @media (max-width: 640px) {
      .stop { min-width: 140px; }
      .stop-name { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<!-- Floating candy decorations -->
<div class="decor" style="top:4%;left:2%;animation-delay:0s">🍭</div>
<div class="decor" style="top:12%;right:3%;animation-delay:1s">🍬</div>
<div class="decor" style="top:28%;left:1%;animation-delay:2s">🧁</div>
<div class="decor" style="top:44%;right:1.5%;animation-delay:0.5s">🍰</div>
<div class="decor" style="top:60%;left:1.5%;animation-delay:3s">🍡</div>
<div class="decor" style="top:74%;right:2%;animation-delay:1.5s">🍩</div>
<div class="decor" style="top:87%;left:3%;animation-delay:2.5s">🍫</div>
<div class="decor" style="top:93%;right:3%;animation-delay:4s">🍪</div>
<div class="decor" style="top:20%;left:0.5%;animation-delay:3.5s">🌈</div>
<div class="decor" style="top:50%;right:0.5%;animation-delay:2s">🎠</div>

<div class="header">
  <h1>Bay Area Eats</h1>
  <p class="subtitle">🍭 The Candyland Edition 🍭</p>
  <div class="source-links">
    <a href="https://sf.eater.com" target="_blank" rel="noopener" class="source-link eater">Eater SF</a>
    <a href="https://www.theinfatuation.com/san-francisco" target="_blank" rel="noopener" class="source-link infatuation">The Infatuation</a>
  </div>
</div>

<div class="board">
  <div class="badge start"><span>🎲 START YOUR FEAST</span></div>
  <div class="path" id="path"></div>
  <div class="badge finish"><span>🏆 BON APPÉTIT!</span></div>
</div>

<footer>
  Curated from <a href="https://sf.eater.com" target="_blank" rel="noopener">Eater SF</a>
  &amp; <a href="https://www.theinfatuation.com/san-francisco" target="_blank" rel="noopener">The Infatuation SF</a>.
  Verify links before visiting — restaurant websites may change.
</footer>

<script>
const restaurants = [
  { name: "Zuni Café",              emoji: "🔥", cuisine: "California", price: "$$",   neighborhood: "Hayes Valley",        url: "https://zunicafe.com" },
  { name: "State Bird Provisions",  emoji: "🐦", cuisine: "California", price: "$$",   neighborhood: "Lower Pac Heights",   url: "https://statebirdsf.com" },
  { name: "Nopa",                   emoji: "🍕", cuisine: "American",   price: "$$",   neighborhood: "NoPa",                url: "https://nopasf.com" },
  { name: "Rich Table",             emoji: "🌿", cuisine: "California", price: "$$$",  neighborhood: "Hayes Valley",        url: "https://richtablesf.com" },
  { name: "Rintaro",                emoji: "🏮", cuisine: "Japanese",   price: "$$$",  neighborhood: "Mission",             url: "https://izakayarintaro.com" },
  { name: "Flour + Water",          emoji: "🍝", cuisine: "Italian",    price: "$$$",  neighborhood: "Mission",             url: "https://flourandwater.com" },
  { name: "La Ciccia",              emoji: "🐟", cuisine: "Italian",    price: "$$$",  neighborhood: "Noe Valley",          url: "https://laciccia.com" },
  { name: "Liholiho Yacht Club",    emoji: "🌺", cuisine: "Hawaiian",   price: "$$$",  neighborhood: "Tendernob",           url: "https://liholihoyachtclub.com" },
  { name: "Burma Superstar",        emoji: "🍜", cuisine: "Burmese",    price: "$",    neighborhood: "Inner Richmond",      url: "https://burmasuperstar.com" },
  { name: "Tartine Manufactory",    emoji: "🥐", cuisine: "Bakery/Café",price: "$",    neighborhood: "Mission",             url: "https://tartinebakery.com" },
  { name: "Saison",                 emoji: "✨", cuisine: "California", price: "$$$$", neighborhood: "SoMa",                url: "https://saisonsf.com" },
  { name: "Quince",                 emoji: "🌸", cuisine: "Italian",    price: "$$$$", neighborhood: "Jackson Square",      url: "https://quincerestaurant.com" },
  { name: "Gary Danko",             emoji: "⭐", cuisine: "American",   price: "$$$$", neighborhood: "Fisherman's Wharf",   url: "https://garydanko.com" },
  { name: "Tony's Pizza Napoletana",emoji: "🍕", cuisine: "Italian",    price: "$$",   neighborhood: "North Beach",         url: "https://tonyspizzanapoletana.com" },
  { name: "Al's Place",             emoji: "🥕", cuisine: "California", price: "$$$",  neighborhood: "Mission",             url: "https://alsplacesf.com" },
  { name: "Birdsong",               emoji: "🌾", cuisine: "California", price: "$$$$", neighborhood: "SoMa",                url: "https://birdsongrestaurant.com" },
  { name: "Nomica",                 emoji: "🍱", cuisine: "Japanese",   price: "$$",   neighborhood: "Tenderloin",          url: "https://nomicasf.com" },
  { name: "El Farolito",            emoji: "🌯", cuisine: "Mexican",    price: "$",    neighborhood: "Mission",             url: "https://elfarolito.com" },
  { name: "La Taqueria",            emoji: "🌮", cuisine: "Mexican",    price: "$",    neighborhood: "Mission",             url: "https://www.lataqueriasf.com" },
  { name: "Hog Island Oyster Co.",  emoji: "🦪", cuisine: "Seafood",    price: "$$",   neighborhood: "Ferry Building",      url: "https://hogislandoysters.com" },
  { name: "Angler",                 emoji: "🎣", cuisine: "Seafood",    price: "$$$",  neighborhood: "Embarcadero",         url: "https://anglerrestaurant.com" },
  { name: "SPQR",                   emoji: "🫙", cuisine: "Italian",    price: "$$$",  neighborhood: "Lower Pac Heights",   url: "https://spqrsf.com" },
  { name: "Bix",                    emoji: "🎷", cuisine: "American",   price: "$$$",  neighborhood: "Jackson Square",      url: "https://bixrestaurant.com" },
  { name: "Dumpling Time",          emoji: "🥟", cuisine: "Chinese",    price: "$$",   neighborhood: "SoMa",                url: "https://dumplingtimesf.com" },
  { name: "Yank Sing",              emoji: "🍤", cuisine: "Chinese",    price: "$$",   neighborhood: "SoMa",                url: "https://yanksing.com" },
];

// Candy-land color palette cycling through each stop
const COLORS = [
  '#FF6B9D','#FFD93D','#6BCB77','#4D96FF',
  '#FF9A3C','#C77DFF','#FF4757','#00C9B1',
  '#FFB347','#87CEEB','#DDA0DD','#98FB98',
  '#FF85A1','#FFC300','#56CFE1','#80FFDB',
];

const PER_ROW = 3;
const path = document.getElementById('path');
const chunks = [];
for (let i = 0; i < restaurants.length; i += PER_ROW) {
  chunks.push(restaurants.slice(i, i + PER_ROW));
}

chunks.forEach((chunk, rowIdx) => {
  // Row of stops
  const row = document.createElement('div');
  row.className = 'row' + (rowIdx % 2 === 1 ? ' reverse' : '');

  chunk.forEach((r, i) => {
    const n = rowIdx * PER_ROW + i;
    const color = COLORS[n % COLORS.length];

    const stop = document.createElement('div');
    stop.className = 'stop';
    stop.style.background = color;
    stop.innerHTML = `
      <div class="stop-num">STOP ${n + 1}</div>
      <a href="${r.url}" target="_blank" rel="noopener">
        <span class="stop-emoji">${r.emoji}</span>
        <div class="stop-name">${r.name}</div>
        <div class="stop-tags">
          <span class="stop-tag">${r.cuisine}</span>
          <span class="stop-tag">${r.price}</span>
        </div>
        <div class="stop-hood">📍 ${r.neighborhood}</div>
        <span class="stop-cta">Visit Website →</span>
      </a>`;
    row.appendChild(stop);
  });

  path.appendChild(row);

  // Connector turn between rows
  if (rowIdx < chunks.length - 1) {
    const nextColor = COLORS[((rowIdx + 1) * PER_ROW) % COLORS.length];
    const isEven = rowIdx % 2 === 0;
    const conn = document.createElement('div');
    conn.className = 'connector ' + (isEven ? 'turn-right' : 'turn-left');
    conn.style.setProperty('--c', nextColor);
    conn.innerHTML = `<div class="connector-inner"></div>`;
    path.appendChild(conn);
  }
});
</script>
</body>
</html>
